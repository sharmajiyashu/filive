name: Deploy to CloudPanel Server
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Build Check (Verification)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies & Build locally
        run: |
          npm ci
          npm run build
        # This step verifies that the code builds successfully on GitHub Actions before triggering the deployment on the server.
        # This prevents breaking the live server if there are TypeScript compiler errors in the merged code.

      - name: Verify Secrets and Variables
        run: |
          echo "=== Checking Secrets (secrets.XYZ) ==="
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "❌ SSH_HOST is EMPTY in Secrets"; else echo "✅ SSH_HOST is configured in Secrets"; fi
          if [ -z "${{ secrets.SSH_USERNAME }}" ]; then echo "❌ SSH_USERNAME is EMPTY in Secrets"; else echo "✅ SSH_USERNAME is configured in Secrets"; fi
          if [ -z "${{ secrets.SSH_PASSWORD }}" ]; then echo "❌ SSH_PASSWORD is EMPTY in Secrets"; else echo "✅ SSH_PASSWORD is configured in Secrets"; fi
          
          echo "=== Checking Variables (vars.XYZ) ==="
          if [ -z "${{ vars.SSH_HOST }}" ]; then echo "❌ SSH_HOST is EMPTY in Variables"; else echo "✅ SSH_HOST is configured in Variables"; fi
          if [ -z "${{ vars.SSH_USERNAME }}" ]; then echo "❌ SSH_USERNAME is EMPTY in Variables"; else echo "✅ SSH_USERNAME is configured in Variables"; fi
          if [ -z "${{ vars.SSH_PASSWORD }}" ]; then echo "❌ SSH_PASSWORD is EMPTY in Variables"; else echo "✅ SSH_PASSWORD is configured in Variables"; fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST || vars.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME || vars.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD || vars.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || vars.SSH_PORT }}
          script: |
            sudo -u creatamax-filiva-node -i bash -c "cd ~/htdocs/filiva-node.creatamax.in/filive && bash deploy.sh"


