<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Connection Tester</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --status-success: #10b981;
            --status-warning: #f59e0b;
            --status-danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 800;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--accent-primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-disconnect {
            background: var(--status-danger);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-disconnect:hover {
            background: #dc2626;
        }

        .status-container {
            margin-top: 2rem;
            border-top: 1px solid var(--card-border);
            padding-top: 1.5rem;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .status-badge {
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-disconnected {
            background: rgba(239, 68, 68, 0.15);
            color: var(--status-danger);
        }
        .status-disconnected::before { background: var(--status-danger); }

        .status-connecting {
            background: rgba(245, 158, 11, 0.15);
            color: var(--status-warning);
        }
        .status-connecting::before { background: var(--status-warning); }

        .status-connected {
            background: rgba(16, 185, 129, 0.15);
            color: var(--status-success);
        }
        .status-connected::before { background: var(--status-success); }

        .console-log {
            width: 100%;
            height: 180px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            color: #38bdf8;
            margin-top: 0.5rem;
        }

        .log-entry {
            margin-bottom: 0.4rem;
            line-height: 1.4;
        }

        .log-time {
            color: var(--text-secondary);
            margin-right: 0.5rem;
        }

        .log-info { color: #38bdf8; }
        .log-success { color: var(--status-success); }
        .log-error { color: var(--status-danger); }
        .log-warning { color: var(--status-warning); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Socket.io Tester</h1>
        <div class="subtitle">Check real-time web socket status for your domain</div>

        <div class="form-group">
            <label for="url">Socket Server URL</label>
            <input type="text" id="url" value="https://filiva-node.creatamax.in" placeholder="e.g. https://domain.com">
        </div>

        <div class="form-group">
            <label for="token">Auth Token (Bearer)</label>
            <input type="text" id="token" placeholder="Optional JWT Token (Leave empty to test middleware rejection)">
        </div>

        <button id="toggleBtn" class="btn">Connect Socket</button>

        <div class="status-container">
            <div class="status-header">
                <span style="font-weight: 600; color: var(--text-secondary);">CONNECTION STATUS</span>
                <span id="badge" class="status-badge status-disconnected">Disconnected</span>
            </div>
            <label>Live Console Logs</label>
            <div id="console" class="console-log">
                <div class="log-entry"><span class="log-time">[System]</span> Ready to connect. Click "Connect Socket" above.</div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('url');
        const tokenInput = document.getElementById('token');
        const toggleBtn = document.getElementById('toggleBtn');
        const badge = document.getElementById('badge');
        const consoleEl = document.getElementById('console');

        let socket = null;

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.innerHTML = `<span class="log-time">[${time}]</span><span class="log-${type}">${message}</span>`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        function updateBadge(status) {
            badge.className = 'status-badge';
            if (status === 'disconnected') {
                badge.classList.add('status-disconnected');
                badge.textContent = 'Disconnected';
                toggleBtn.textContent = 'Connect Socket';
                toggleBtn.className = 'btn';
            } else if (status === 'connecting') {
                badge.classList.add('status-connecting');
                badge.textContent = 'Connecting';
                toggleBtn.textContent = 'Connecting...';
                toggleBtn.className = 'btn';
            } else if (status === 'connected') {
                badge.classList.add('status-connected');
                badge.textContent = 'Connected';
                toggleBtn.textContent = 'Disconnect';
                toggleBtn.className = 'btn btn-disconnect';
            }
        }

        toggleBtn.addEventListener('click', () => {
            if (socket && socket.connected) {
                log('Disconnecting from server...', 'warning');
                socket.disconnect();
                return;
            }

            const url = urlInput.value.trim();
            const token = tokenInput.value.trim();

            if (!url) {
                log('Error: Server URL cannot be empty.', 'error');
                return;
            }

            log(`Initiating connection to: ${url}`, 'info');
            updateBadge('connecting');

            const options = {
                transports: ['websocket', 'polling'],
                forceNew: true,
                reconnection: false
            };

            if (token) {
                options.auth = { token: token };
                log('Sending connection request with authentication token.', 'info');
            } else {
                log('Sending connection request without a token (expecting middleware rejection if auth is enforced).', 'warning');
            }

            try {
                socket = io(url, options);

                socket.on('connect', () => {
                    log('Successfully connected to the socket server!', 'success');
                    log(`Socket ID: ${socket.id}`, 'success');
                    updateBadge('connected');
                });

                socket.on('connect_error', (error) => {
                    log(`Connection Error: ${error.message}`, 'error');
                    if (error.message === 'Unauthorized' || error.message.includes('auth')) {
                        log('Server rejected the connection because of missing/invalid Auth Token. This means the Socket server is UP and the authentication middleware is working!', 'success');
                    } else {
                        log('Could not establish connection. Ensure the domain is online and CORS/transports are configured correctly.', 'error');
                    }
                    updateBadge('disconnected');
                    socket = null;
                });

                socket.on('disconnect', (reason) => {
                    log(`Socket disconnected. Reason: ${reason}`, 'warning');
                    updateBadge('disconnected');
                    socket = null;
                });
            } catch (err) {
                log(`Javascript Error: ${err.message}`, 'error');
                updateBadge('disconnected');
                socket = null;
            }
        });
    </script>
</body>
</html>
